<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SANKALP 2026 - Event Command Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0E0F09;
            --surface: #1A1C11;
            --surface2: #22251A;
            --olive: #5F6838;
            --olive-bright: #8F993C;
            --gold: #D9AB28;
            --text: #F5F2E8;
            --text-dim: #9A9880;
            --red: #C0392B;
            --accent-g1: #6B9BD1;
            --accent-g2: #D4A574;
            --accent-g3: #7FBB9B;
            --accent-g4: #C97C7C;
            --accent-g5: #9B8BC7;
            --accent-g6: #B5A84C;
            --accent-g7: #6FA89F;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Gill Sans', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* ========== LOGIN SCREEN ========== */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--bg) 0%, var(--surface) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            flex-direction: column;
            gap: 40px;
        }

        #loginScreen.hidden {
            display: none;
        }

        .login-logo {
            font-size: 48px;
            font-weight: 700;
            letter-spacing: -1px;
            color: var(--gold);
            text-align: center;
        }

        .login-subtitle {
            color: var(--text-dim);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 300px;
        }

        .login-form input {
            background: var(--surface2);
            border: 1px solid var(--olive);
            color: var(--text);
            padding: 12px 16px;
            font-size: 16px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            text-align: center;
        }

        .login-form input::placeholder {
            color: var(--text-dim);
        }

        .login-form button {
            background: var(--olive-bright);
            color: var(--bg);
            border: none;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s;
        }

        .login-form button:hover {
            background: var(--gold);
        }

        /* ========== MAIN LAYOUT ========== */
        #mainApp {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--olive);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            flex-shrink: 0;
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 18px;
            font-weight: 600;
        }

        .logo-mini {
            color: var(--gold);
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.5px;
        }

        .top-bar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--text-dim);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #2ECC71;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .clock {
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text);
        }

        /* State Strip */
        .state-strip {
            background: var(--surface);
            border-bottom: 1px solid var(--olive);
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0;
            padding: 0;
            height: 48px;
            flex-shrink: 0;
        }

        .state-btn {
            background: var(--surface);
            border: none;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            border-right: 1px solid var(--surface2);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .state-btn:last-child {
            border-right: none;
        }

        .state-btn:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .state-btn.active {
            background: var(--olive);
            color: var(--bg);
        }

        /* One-Tap Action Strip */
        .action-strip {
            background: var(--surface);
            border-bottom: 1px solid var(--olive);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            padding: 0;
            height: 44px;
            flex-shrink: 0;
        }

        .action-btn {
            background: var(--surface);
            border: none;
            border-right: 1px solid var(--surface2);
            color: var(--text);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .action-btn:last-child {
            border-right: none;
        }

        .action-btn:hover {
            background: var(--surface2);
            color: var(--gold);
        }

        .action-btn:active {
            background: var(--olive);
            color: var(--bg);
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            grid-auto-rows: max-content;
        }

        /* Bento Grid */
        .bento-item {
            background: var(--surface2);
            border: 1px solid var(--olive);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .bento-item-title {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--gold);
        }

        /* AI Command Center */
        #aiCommandCenter {
            grid-column: 1 / -1;
            grid-row: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 320px;
        }

        .ai-chat-window {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--olive);
            border-radius: 6px;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 140px;
            font-size: 12px;
            line-height: 1.4;
        }

        .chat-message {
            padding: 8px 12px;
            background: var(--surface2);
            border-radius: 4px;
            color: var(--text-dim);
        }

        .chat-message.sent {
            background: var(--olive);
            color: var(--bg);
            align-self: flex-end;
            max-width: 80%;
        }

        .ai-controls {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
        }

        .quick-cmd-btn {
            background: var(--olive);
            border: none;
            color: var(--bg);
            font-size: 11px;
            font-weight: 600;
            padding: 8px 4px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .quick-cmd-btn:hover {
            background: var(--olive-bright);
        }

        .quick-cmd-btn:active {
            background: var(--gold);
            color: var(--bg);
        }

        .ai-input-area {
            display: flex;
            gap: 6px;
        }

        .ai-input-area input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--olive);
            color: var(--text);
            padding: 8px 10px;
            border-radius: 4px;
            font-size: 12px;
        }

        .ai-btn {
            background: var(--olive-bright);
            border: none;
            color: var(--bg);
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ai-btn:hover {
            background: var(--gold);
        }

        /* Arrivals Intelligence */
        #arrivalsPanel {
            grid-column: 1 / 3;
            grid-row: 2;
            max-height: 500px;
            overflow-y: auto;
        }

        .group-progress {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--olive);
            font-size: 12px;
        }

        .group-progress-item {
            color: var(--text-dim);
        }

        .attendee-row {
            display: grid;
            grid-template-columns: 24px 1fr auto;
            gap: 12px;
            align-items: center;
            padding: 10px;
            background: var(--surface);
            border-radius: 4px;
            margin-bottom: 8px;
            font-size: 12px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .attendee-row.late {
            background: rgba(230, 126, 34, 0.15);
            border-left-color: #E67E22;
        }

        .attendee-row:hover {
            background: var(--surface2);
        }

        .attendee-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid var(--text-dim);
        }

        .attendee-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .attendee-name {
            color: var(--text);
            font-weight: 600;
        }

        .attendee-meta {
            color: var(--text-dim);
            font-size: 11px;
        }

        .attendee-time {
            color: var(--gold);
            font-size: 11px;
        }

        .attendee-actions {
            display: flex;
            gap: 4px;
        }

        .attendee-action-btn {
            background: var(--olive);
            border: none;
            color: var(--bg);
            padding: 4px 8px;
            font-size: 10px;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .attendee-action-btn:hover {
            background: var(--olive-bright);
        }

        /* Journey Control */
        #journeyControl {
            grid-column: 3;
            grid-row: 2;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .journey-session {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .session-display {
            background: var(--surface);
            border: 1px solid var(--olive);
            padding: 10px;
            border-radius: 4px;
            font-size: 13px;
            color: var(--text);
            font-weight: 600;
            text-align: center;
            min-height: 32px;
        }

        .session-input-area {
            display: flex;
            gap: 6px;
        }

        .session-input-area input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--olive);
            color: var(--text);
            padding: 8px;
            border-radius: 4px;
            font-size: 12px;
        }

        .session-btn {
            background: var(--olive-bright);
            border: none;
            color: var(--bg);
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .session-btn:hover {
            background: var(--gold);
        }

        .tour-controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tour-group {
            display: flex;
            gap: 4px;
            font-size: 11px;
        }

        .tour-group-label {
            background: var(--surface);
            padding: 6px 8px;
            border-radius: 3px;
            color: var(--text-dim);
            min-width: 50px;
            text-align: center;
            font-weight: 600;
        }

        .tour-btn {
            flex: 1;
            background: var(--olive);
            border: none;
            color: var(--bg);
            padding: 6px;
            border-radius: 3px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tour-btn.active {
            background: var(--gold);
        }

        .tour-btn:hover {
            background: var(--olive-bright);
        }

        /* Feedback Panel */
        #feedbackPanel {
            grid-column: 1 / 2;
            grid-row: 3;
            max-height: 400px;
            overflow-y: auto;
        }

        .feedback-rating {
            font-size: 32px;
            font-weight: 700;
            color: var(--gold);
            text-align: center;
            margin: 10px 0;
        }

        .feedback-sentiment {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin: 12px 0;
            padding: 10px 0;
            border-top: 1px solid var(--olive);
            border-bottom: 1px solid var(--olive);
            font-size: 12px;
        }

        .sentiment-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-dim);
        }

        .sentiment-item strong {
            color: var(--text);
        }

        .feedback-keywords {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 12px 0;
        }

        .keyword-chip {
            background: var(--olive);
            color: var(--bg);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .feedback-submissions {
            border-top: 1px solid var(--olive);
            padding-top: 12px;
            max-height: 200px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .feedback-item {
            background: var(--surface);
            padding: 8px;
            border-radius: 4px;
            font-size: 11px;
            line-height: 1.4;
        }

        .feedback-item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .feedback-name {
            color: var(--text);
            font-weight: 600;
        }

        .feedback-rating-stars {
            color: var(--gold);
        }

        .feedback-comment {
            color: var(--text-dim);
            font-style: italic;
        }

        .feedback-download-btn {
            background: var(--olive-bright);
            border: none;
            color: var(--bg);
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .feedback-download-btn:hover {
            background: var(--gold);
        }

        /* Broadcast System */
        #broadcastPanel {
            grid-column: 2 / -1;
            grid-row: 3;
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 400px;
        }

        .broadcast-textarea {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--olive);
            color: var(--text);
            padding: 10px;
            border-radius: 4px;
            font-family: inherit;
            font-size: 12px;
            resize: none;
            min-height: 80px;
        }

        .broadcast-tone {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
        }

        .tone-btn {
            background: var(--olive);
            border: none;
            color: var(--bg);
            padding: 6px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tone-btn.active {
            background: var(--gold);
        }

        .tone-btn:hover {
            background: var(--olive-bright);
        }

        .broadcast-controls {
            display: flex;
            gap: 6px;
        }

        .broadcast-btn {
            flex: 1;
            background: var(--olive-bright);
            border: none;
            color: var(--bg);
            padding: 8px 12px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .broadcast-btn:hover {
            background: var(--gold);
        }

        .broadcast-preview {
            background: var(--surface);
            border: 1px solid var(--olive);
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            color: var(--text-dim);
            min-height: 40px;
            max-height: 80px;
            overflow-y: auto;
            line-height: 1.4;
        }

        .delivery-status {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            font-size: 11px;
            margin-top: 8px;
        }

        .delivery-stat {
            background: var(--surface);
            padding: 8px;
            border-radius: 4px;
            text-align: center;
            border-left: 3px solid var(--olive);
        }

        .delivery-stat-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--gold);
        }

        .delivery-stat-label {
            color: var(--text-dim);
            font-size: 10px;
        }

        /* SOS Banner */
        .sos-banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: var(--red);
            color: white;
            padding: 12px 20px;
            text-align: center;
            font-weight: 700;
            font-size: 14px;
            z-index: 9998;
            display: none;
            animation: sosFlash 0.5s infinite;
        }

        .sos-banner.active {
            display: block;
        }

        @keyframes sosFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Emergency Button */
        .emergency-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--red);
            border: none;
            color: white;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(192, 57, 43, 0.5);
            transition: all 0.2s;
            z-index: 1000;
        }

        .emergency-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(192, 57, 43, 0.7);
        }

        .emergency-btn:active {
            transform: scale(0.95);
        }

        /* Responsive */
        @media (max-width: 1400px) {
            .main-content {
                grid-template-columns: 1fr 1fr;
            }

            #aiCommandCenter {
                grid-column: 1 / -1;
            }

            #arrivalsPanel {
                grid-column: 1 / -1;
            }

            #feedbackPanel {
                grid-column: 1;
            }

            #broadcastPanel {
                grid-column: 2;
            }
        }

        @media (max-width: 900px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            #aiCommandCenter {
                grid-column: 1;
            }

            #arrivalsPanel {
                grid-column: 1;
            }

            #journeyControl {
                grid-column: 1;
            }

            #feedbackPanel {
                grid-column: 1;
            }

            #broadcastPanel {
                grid-column: 1;
            }

            .state-strip,
            .action-strip {
                grid-template-columns: 1fr 1fr;
            }

            .state-btn,
            .action-btn {
                font-size: 11px;
            }
        }

        @media (max-width: 600px) {
            .top-bar {
                flex-direction: column;
                height: auto;
                gap: 8px;
                padding: 10px;
            }

            .top-bar-right {
                width: 100%;
                justify-content: space-between;
            }

            .main-content {
                padding: 12px;
                gap: 12px;
            }

            #aiCommandCenter {
                max-height: 250px;
            }

            .ai-controls {
                grid-template-columns: repeat(3, 1fr);
            }

            .attendee-actions {
                flex-direction: column;
                width: 100%;
            }

            .attendee-action-btn {
                width: 100%;
            }
        }

        /* Scrollbar Styling */
        .main-content::-webkit-scrollbar,
        .ai-chat-window::-webkit-scrollbar,
        #arrivalsPanel::-webkit-scrollbar,
        .feedback-submissions::-webkit-scrollbar {
            width: 6px;
        }

        .main-content::-webkit-scrollbar-track,
        .ai-chat-window::-webkit-scrollbar-track,
        #arrivalsPanel::-webkit-scrollbar-track,
        .feedback-submissions::-webkit-scrollbar-track {
            background: var(--surface);
        }

        .main-content::-webkit-scrollbar-thumb,
        .ai-chat-window::-webkit-scrollbar-thumb,
        #arrivalsPanel::-webkit-scrollbar-thumb,
        .feedback-submissions::-webkit-scrollbar-thumb {
            background: var(--olive);
            border-radius: 3px;
        }

        .main-content::-webkit-scrollbar-thumb:hover,
        .ai-chat-window::-webkit-scrollbar-thumb:hover,
        #arrivalsPanel::-webkit-scrollbar-thumb:hover,
        .feedback-submissions::-webkit-scrollbar-thumb:hover {
            background: var(--olive-bright);
        }
    </style>
</head>
<body>
    <!-- PIN Login Screen -->
    <div id="loginScreen">
        <div class="login-logo">SANKALP</div>
        <div class="login-subtitle">Event Command Center</div>
        <div class="login-form">
            <input type="password" id="pinInput" placeholder="••••••" maxlength="6">
            <button id="loginBtn">Enter</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <!-- SOS Banner -->
        <div id="sosBanner" class="sos-banner"></div>

        <!-- Top Bar -->
        <div class="top-bar">
            <div class="top-bar-left">
                <span class="logo-mini">SANKALP</span>
                <span style="color: var(--text-dim);">|</span>
                <span style="font-size: 14px;">Event Command</span>
            </div>
            <div class="top-bar-right">
                <div class="live-indicator">
                    <div class="live-dot"></div>
                    <span>LIVE</span>
                </div>
                <div class="clock" id="clockDisplay">00:00:00</div>
                <div class="live-indicator" id="connectionStatus">
                    <div class="live-dot" style="background: #2ECC71;"></div>
                    <span>Connected</span>
                </div>
            </div>
        </div>

        <!-- State Strip -->
        <div class="state-strip">
            <button class="state-btn active" data-state="arrival">Arrival</button>
            <button class="state-btn" data-state="registration">Registration</button>
            <button class="state-btn" data-state="session">Session Live</button>
            <button class="state-btn" data-state="transit">Transit</button>
            <button class="state-btn" data-state="feedback">Feedback</button>
        </div>

        <!-- Action Strip -->
        <div class="action-strip">
            <button class="action-btn" data-action="callAll">📣 Call All</button>
            <button class="action-btn" data-action="busAlert">🚌 Bus Alert</button>
            <button class="action-btn" data-action="moveHall">🚶 Move to Hall</button>
            <button class="action-btn" data-action="lunch">🍽 Lunch</button>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- AI Command Center -->
            <div id="aiCommandCenter" class="bento-item">
                <div class="bento-item-title">AI Command Center</div>
                <div class="ai-chat-window" id="aiChatWindow"></div>
                <div class="ai-controls" id="aiQuickCommands">
                    <button class="quick-cmd-btn" data-cmd="callAll">Call All</button>
                    <button class="quick-cmd-btn" data-cmd="busAlert">Bus Alert</button>
                    <button class="quick-cmd-btn" data-cmd="moveHall">Move Hall</button>
                    <button class="quick-cmd-btn" data-cmd="lunch">Lunch</button>
                    <button class="quick-cmd-btn" data-cmd="emergency">Emergency</button>
                    <button class="quick-cmd-btn" data-cmd="g1Live">G1 Live</button>
                    <button class="quick-cmd-btn" data-cmd="g1Done">G1 Done</button>
                    <button class="quick-cmd-btn" data-cmd="g2Live">G2 Live</button>
                    <button class="quick-cmd-btn" data-cmd="g2Done">G2 Done</button>
                    <button class="quick-cmd-btn" data-cmd="feedback">Feedback</button>
                    <button class="quick-cmd-btn" data-cmd="status">Status</button>
                </div>
                <div class="ai-input-area">
                    <input type="text" id="aiInput" placeholder="Type message or use quick commands...">
                    <button class="ai-btn" id="aiRewriteBtn">Rewrite</button>
                    <button class="ai-btn" id="aiSendBtn">Send</button>
                </div>
            </div>

            <!-- Arrivals Intelligence -->
            <div id="arrivalsPanel" class="bento-item">
                <div class="bento-item-title">Arrivals Intelligence</div>
                <div class="group-progress" id="groupProgress"></div>
                <div id="attendeesList"></div>
            </div>

            <!-- Journey Control -->
            <div id="journeyControl" class="bento-item">
                <div class="bento-item-title">Journey Control</div>
                <div class="journey-session">
                    <div class="session-display" id="sessionDisplay">Waiting...</div>
                    <div class="session-input-area">
                        <input type="text" id="sessionInput" placeholder="Set session">
                        <button class="session-btn" id="sessionSetBtn">Set</button>
                    </div>
                </div>
                <div class="tour-controls" id="tourControls"></div>
            </div>

            <!-- Feedback Panel -->
            <div id="feedbackPanel" class="bento-item">
                <div class="bento-item-title">Feedback Panel</div>
                <div class="feedback-rating" id="feedbackRating">--</div>
                <div class="feedback-sentiment" id="feedbackSentiment"></div>
                <div class="feedback-keywords" id="feedbackKeywords"></div>
                <div class="feedback-submissions" id="feedbackSubmissions"></div>
                <button class="feedback-download-btn" id="feedbackDownloadBtn">Download Report</button>
            </div>

            <!-- Broadcast System -->
            <div id="broadcastPanel" class="bento-item">
                <div class="bento-item-title">Broadcast System</div>
                <textarea id="broadcastTextarea" class="broadcast-textarea" placeholder="Type your announcement..."></textarea>
                <div class="broadcast-tone" id="broadcastTone">
                    <button class="tone-btn active" data-tone="normal">Normal</button>
                    <button class="tone-btn" data-tone="urgent">Urgent</button>
                    <button class="tone-btn" data-tone="critical">Critical</button>
                </div>
                <div class="broadcast-preview" id="broadcastPreview">Preview appears here...</div>
                <div class="broadcast-controls">
                    <button class="broadcast-btn" id="broadcastRewriteBtn">Rewrite</button>
                    <button class="broadcast-btn" id="broadcastSendBtn">Send</button>
                </div>
                <div class="delivery-status" id="deliveryStatus"></div>
            </div>
        </div>
    </div>

    <!-- Emergency Button -->
    <button class="emergency-btn" id="emergencyBtn" title="Emergency Alert">⚡</button>

    <script>
        // ========== STATE & CONFIG ==========
        const config = {
            apiBase: '/api',
            sseUrl: '/api/events?id=admin',
            pollInterval: 10000, // 10s for announcements
            pinStorageKey: 'sankalp_admin_pin'
        };

        let appState = {
            authenticated: false,
            adminPin: null,
            currentState: 'arrival',
            currentTone: 'normal',
            currentSession: 'Waiting...',
            attendees: [],
            feedback: { rating: 0, sentiment: {}, keywords: [], submissions: [] },
            announcements: [],
            tourState: {}
        };

        // Color mapping for groups
        const groupColors = {
            1: '--accent-g1', 2: '--accent-g2', 3: '--accent-g3',
            4: '--accent-g4', 5: '--accent-g5', 6: '--accent-g6', 7: '--accent-g7'
        };

        // ========== LOGIN LOGIC ==========
        function initLogin() {
            const storedPin = localStorage.getItem(config.pinStorageKey);
            if (storedPin) {
                appState.adminPin = storedPin;
                authenticate(storedPin);
            } else {
                document.getElementById('loginBtn').addEventListener('click', () => {
                    const pin = document.getElementById('pinInput').value.trim();
                    if (pin.length === 6) {
                        localStorage.setItem(config.pinStorageKey, pin);
                        appState.adminPin = pin;
                        authenticate(pin);
                    }
                });
                document.getElementById('pinInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') document.getElementById('loginBtn').click();
                });
            }
        }

        function authenticate(pin) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            appState.authenticated = true;
            initApp();
        }

        // ========== CLOCK ==========
        function updateClock() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clockDisplay').textContent = `${hh}:${mm}:${ss}`;
        }

        // ========== STATE BUTTONS ==========
        function initStateButtons() {
            document.querySelectorAll('.state-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    appState.currentState = btn.dataset.state;
                    sendEvent('stateChanged', { state: appState.currentState });
                });
            });
        }

        // ========== ACTION BUTTONS ==========
        function initActionButtons() {
            const actions = {
                callAll: 'Attention all attendees: Please stand by for further instructions.',
                busAlert: 'Bus transportation alert: Please proceed to the designated pickup point.',
                moveHall: 'Please head to the main hall for the next session.',
                lunch: 'Lunch service is now available. Please proceed to the dining area.'
            };

            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const action = btn.dataset.action;
                    const message = actions[action] || 'Action triggered.';
                    broadcastAnnouncement(message);
                });
            });
        }

        // ========== AI COMMAND CENTER ==========
        function initAICenter() {
            const quickCommands = {
                callAll: 'Attention all attendees: Please stand by for further instructions.',
                busAlert: 'Bus transportation alert: Please proceed to the designated pickup point.',
                moveHall: 'Please head to the main hall for the next session.',
                lunch: 'Lunch service is now available. Please proceed to the dining area.',
                emergency: '🚨 EMERGENCY ALERT — All attendees stop what you are doing and await further instructions from the event team.',
                g1Live: 'Group 1: Your session is now live. Please assemble in your assigned area.',
                g1Done: 'Group 1: Session complete. Please proceed to the next activity.',
                g2Live: 'Group 2: Your session is now live. Please assemble in your assigned area.',
                g2Done: 'Group 2: Session complete. Please proceed to the next activity.',
                feedback: 'Please take a moment to provide your feedback on today\'s event.',
                status: 'Current status update: All operations running normally.'
            };

            document.querySelectorAll('.quick-cmd-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const cmd = btn.dataset.cmd;
                    const message = quickCommands[cmd] || '';
                    if (message) {
                        document.getElementById('aiInput').value = message;
                        updateBroadcastPreview(message);
                    }
                });
            });

            document.getElementById('aiRewriteBtn').addEventListener('click', () => {
                const text = document.getElementById('aiInput').value;
                if (text.trim()) {
                    rewriteMessage(text, 'ai');
                }
            });

            document.getElementById('aiSendBtn').addEventListener('click', () => {
                const text = document.getElementById('aiInput').value;
                if (text.trim()) {
                    broadcastAnnouncement(text);
                    document.getElementById('aiInput').value = '';
                    addChatMessage(text, 'sent');
                }
            });

            document.getElementById('aiInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    document.getElementById('aiSendBtn').click();
                }
            });
        }

        function addChatMessage(text, type = 'received') {
            const chat = document.getElementById('aiChatWindow');
            const msg = document.createElement('div');
            msg.className = `chat-message ${type}`;
            msg.textContent = text;
            chat.appendChild(msg);
            chat.scrollTop = chat.scrollHeight;
        }

        // ========== BROADCAST SYSTEM ==========
        function initBroadcastSystem() {
            document.querySelectorAll('.tone-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    appState.currentTone = btn.dataset.tone;
                });
            });

            document.getElementById('broadcastTextarea').addEventListener('input', (e) => {
                updateBroadcastPreview(e.target.value);
            });

            document.getElementById('broadcastRewriteBtn').addEventListener('click', () => {
                const text = document.getElementById('broadcastTextarea').value;
                if (text.trim()) {
                    rewriteMessage(text, 'broadcast');
                }
            });

            document.getElementById('broadcastSendBtn').addEventListener('click', () => {
                const text = document.getElementById('broadcastTextarea').value;
                if (text.trim()) {
                    broadcastAnnouncement(text);
                    document.getElementById('broadcastTextarea').value = '';
                    updateBroadcastPreview('');
                }
            });
        }

        function updateBroadcastPreview(text) {
            document.getElementById('broadcastPreview').textContent = text || 'Preview appears here...';
        }

        async function rewriteMessage(text, context) {
            try {
                const response = await fetch(`${config.apiBase}/agent`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-pin': appState.adminPin
                    },
                    body: JSON.stringify({ message: text, mode: 'rewrite' })
                });
                const data = await response.json();
                const rewritten = data.reply || text;
                if (context === 'broadcast') {
                    document.getElementById('broadcastTextarea').value = rewritten;
                    updateBroadcastPreview(rewritten);
                } else {
                    document.getElementById('aiInput').value = rewritten;
                }
            } catch (e) {
                console.error('Rewrite failed:', e);
            }
        }

        async function broadcastAnnouncement(text) {
            try {
                const response = await fetch(`${config.apiBase}/admin/announce`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-pin': appState.adminPin
                    },
                    body: JSON.stringify({ message: text, tone: appState.currentTone })
                });
                const data = await response.json();
                if (data.entry) appState.announcements.unshift(data.entry);
                updateDeliveryStatus();
                addChatMessage(`[SENT] ${text}`, 'sent');
            } catch (e) {
                console.error('Broadcast failed:', e);
            }
        }

        function updateDeliveryStatus() {
            const status = document.getElementById('deliveryStatus');
            status.innerHTML = '';
            if (appState.announcements.length === 0) return;

            const latest = appState.announcements[0];
            const stats = [
                { label: 'Sent', value: latest.sent || 0 },
                { label: 'Seen', value: Array.isArray(latest.seen) ? latest.seen.length : (latest.seen || 0) },
                { label: 'Acked', value: Array.isArray(latest.acked) ? latest.acked.length : (latest.acked || 0) },
                { label: 'Pending', value: Array.isArray(latest.pending) ? latest.pending.length : (latest.pending || 0) }
            ];

            stats.forEach(stat => {
                const div = document.createElement('div');
                div.className = 'delivery-stat';
                div.innerHTML = `<div class="delivery-stat-value">${stat.value}</div><div class="delivery-stat-label">${stat.label}</div>`;
                status.appendChild(div);
            });
        }

        // ========== JOURNEY CONTROL ==========
        function initJourneyControl() {
            document.getElementById('sessionSetBtn').addEventListener('click', () => {
                const input = document.getElementById('sessionInput');
                appState.currentSession = input.value || 'Waiting...';
                document.getElementById('sessionDisplay').textContent = appState.currentSession;
                input.value = '';
                sendEvent('sessionUpdated', { session: appState.currentSession });
            });

            document.getElementById('sessionInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') document.getElementById('sessionSetBtn').click();
            });

            // Tour controls
            const tourControls = document.getElementById('tourControls');
            ['Group 1', 'Group 2'].forEach((group, idx) => {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'tour-group';
                const label = document.createElement('div');
                label.className = 'tour-group-label';
                label.textContent = group;
                const btnLive = document.createElement('button');
                btnLive.className = 'tour-btn';
                btnLive.textContent = 'LIVE';
                btnLive.addEventListener('click', () => setTourState(group, 'live', btnLive));
                const btnDone = document.createElement('button');
                btnDone.className = 'tour-btn';
                btnDone.textContent = 'Done';
                btnDone.addEventListener('click', () => setTourState(group, 'done', btnDone));
                const btnReset = document.createElement('button');
                btnReset.className = 'tour-btn';
                btnReset.textContent = 'Reset';
                btnReset.addEventListener('click', () => setTourState(group, 'reset', btnReset));
                groupDiv.appendChild(label);
                groupDiv.appendChild(btnLive);
                groupDiv.appendChild(btnDone);
                groupDiv.appendChild(btnReset);
                tourControls.appendChild(groupDiv);
            });
        }

        function setTourState(group, state, btn) {
            appState.tourState[group] = state;
            const parent = btn.parentElement;
            parent.querySelectorAll('.tour-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            sendEvent('tourUpdated', { group, state });
        }

        // ========== ARRIVALS PANEL ==========
        function initArrivalsPanel() {
            loadRealAttendees();
        }

        async function loadRealAttendees() {
            try {
                const res = await fetch(`${config.apiBase}/admin/attendees`, {
                    headers: { 'x-admin-pin': appState.adminPin }
                });
                const data = await res.json();
                // Normalise field names from actual attendees.json structure
                appState.attendees = data.map(a => ({
                    id: a.id,
                    name: a.name,
                    dept: a.department || '',
                    group: a.group || 1,
                    groupColor: a.groupColor || '#5F6838',
                    phone: a.phone || '',
                    arrived: a.arrived || false,
                    arrivedAt: a.arrivedAt || null
                }));
                renderArrivals();
            } catch (e) {
                console.error('Failed to load attendees:', e);
            }
        }

        function renderArrivals() {
            const panel = document.getElementById('arrivalsPanel');
            const list = document.getElementById('attendeesList');
            if (!list) return;

            list.innerHTML = '';

            // Group progress
            const progress = document.getElementById('groupProgress');
            progress.innerHTML = '';
            [1, 2].forEach(g => {
                const total = appState.attendees.filter(a => a.group === g).length;
                const arrived = appState.attendees.filter(a => a.group === g && a.arrived).length;
                const item = document.createElement('div');
                item.className = 'group-progress-item';
                item.textContent = `Group ${g}: ${arrived}/${total} ✓`;
                progress.appendChild(item);
            });

            // Sort by group, then by arrival
            const sorted = [...appState.attendees].sort((a, b) => {
                if (a.group !== b.group) return a.group - b.group;
                return a.arrived === b.arrived ? 0 : a.arrived ? -1 : 1;
            });

            sorted.forEach(att => {
                const row = document.createElement('div');
                row.className = 'attendee-row';

                // Check if late — arrivedAt is ISO string from server
                const arrivedTime = att.arrivedAt ? new Date(att.arrivedAt) : null;
                const arrivedStr = arrivedTime
                    ? arrivedTime.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })
                    : null;

                const dot = document.createElement('div');
                dot.className = 'attendee-dot';
                const colorVar = groupColors[att.group] || '--accent-g1';
                dot.style.borderColor = `var(${colorVar})`;
                if (att.arrived) dot.style.backgroundColor = `var(${colorVar})`;

                const info = document.createElement('div');
                info.className = 'attendee-info';
                const name = document.createElement('div');
                name.className = 'attendee-name';
                name.textContent = att.name;
                const meta = document.createElement('div');
                meta.className = 'attendee-meta';
                meta.innerHTML = `${att.dept} • G${att.group}`;
                const time = document.createElement('div');
                time.className = 'attendee-time';
                time.textContent = att.arrived ? `Arrived: ${arrivedStr || '—'}` : 'Not arrived';
                info.appendChild(name);
                info.appendChild(meta);
                info.appendChild(time);

                const actions = document.createElement('div');
                actions.className = 'attendee-actions';

                const pingBtn = document.createElement('button');
                pingBtn.className = 'attendee-action-btn';
                pingBtn.textContent = 'Ping';
                pingBtn.addEventListener('click', () => pingAttendee(att.id));

                const callBtn = document.createElement('button');
                callBtn.className = 'attendee-action-btn';
                callBtn.textContent = 'Call';
                callBtn.addEventListener('click', () => window.location.href = `tel:+91${att.phone}`);

                const dirBtn = document.createElement('button');
                dirBtn.className = 'attendee-action-btn';
                dirBtn.textContent = 'Dir';
                dirBtn.addEventListener('click', () => sendDirection(att.id));

                actions.appendChild(pingBtn);
                actions.appendChild(callBtn);
                actions.appendChild(dirBtn);

                row.appendChild(dot);
                row.appendChild(info);
                row.appendChild(actions);
                list.appendChild(row);
            });
        }

        async function pingAttendee(id) {
            try {
                await fetch(`${config.apiBase}/admin/ping/${id}`, {
                    method: 'POST',
                    headers: { 'x-admin-pin': appState.adminPin }
                });
                addChatMessage(`[PING] Attendee ${id} pinged.`, 'sent');
            } catch (e) {
                console.error('Ping failed:', e);
            }
        }

        async function sendDirection(id) {
            try {
                await fetch(`${config.apiBase}/admin/direction/${id}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-admin-pin': appState.adminPin
                    },
                    body: JSON.stringify({ message: 'Please head to the main hall.' })
                });
                addChatMessage(`[DIRECTION] Attendee ${id} directed to hall.`, 'sent');
            } catch (e) {
                console.error('Direction failed:', e);
            }
        }

        // ========== FEEDBACK PANEL ==========
        function initFeedbackPanel() {
            loadRealFeedback();
            document.getElementById('feedbackDownloadBtn').addEventListener('click', downloadFeedbackReport);
        }

        async function loadRealFeedback() {
            try {
                const res = await fetch(`${config.apiBase}/admin/feedback`, {
                    headers: { 'x-admin-pin': appState.adminPin }
                });
                const data = await res.json();
                appState.feedback = {
                    rating: data.avgRating || 0,
                    sentiment: data.sentimentSummary || { positive: 0, neutral: 0, negative: 0 },
                    keywords: data.topKeywords || [],
                    submissions: (data.feedback || []).map(f => ({
                        name: f.name,
                        rating: f.rating,
                        sentiment: f.sentiment === 'positive' ? '✅' : f.sentiment === 'negative' ? '❌' : '😐',
                        comment: f.comment
                    }))
                };
                renderFeedback();
            } catch (e) {
                console.error('Failed to load feedback:', e);
                appState.feedback = { rating: 0, sentiment: { positive: 0, neutral: 0, negative: 0 }, keywords: [], submissions: [] };
                renderFeedback();
            }
        }

        function renderFeedback() {
            document.getElementById('feedbackRating').textContent = appState.feedback.rating;

            const sentimentDiv = document.getElementById('feedbackSentiment');
            sentimentDiv.innerHTML = '';
            const sentiments = [
                { emoji: '✅', label: 'Positive', count: appState.feedback.sentiment.positive },
                { emoji: '😐', label: 'Neutral', count: appState.feedback.sentiment.neutral },
                { emoji: '❌', label: 'Negative', count: appState.feedback.sentiment.negative }
            ];
            sentiments.forEach(s => {
                const item = document.createElement('div');
                item.className = 'sentiment-item';
                item.innerHTML = `<span>${s.emoji} ${s.label}</span><strong>${s.count}</strong>`;
                sentimentDiv.appendChild(item);
            });

            const keywordsDiv = document.getElementById('feedbackKeywords');
            keywordsDiv.innerHTML = '';
            appState.feedback.keywords.forEach(kw => {
                const chip = document.createElement('div');
                chip.className = 'keyword-chip';
                chip.textContent = kw;
                keywordsDiv.appendChild(chip);
            });

            const submissionsDiv = document.getElementById('feedbackSubmissions');
            submissionsDiv.innerHTML = '';
            appState.feedback.submissions.forEach(sub => {
                const item = document.createElement('div');
                item.className = 'feedback-item';
                item.innerHTML = `
                    <div class="feedback-item-header">
                        <span class="feedback-name">${sub.name}</span>
                        <span class="feedback-rating-stars">${'⭐'.repeat(sub.rating)}</span>
                    </div>
                    <div class="feedback-comment">${sub.comment}</div>
                `;
                submissionsDiv.appendChild(item);
            });
        }

        function downloadFeedbackReport() {
            const csv = 'Name,Rating,Sentiment,Comment\n' +
                appState.feedback.submissions.map(s => `"${s.name}",${s.rating},"${s.sentiment}","${s.comment}"`).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'feedback_report.csv';
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // ========== SSE CONNECTION ==========
        function initSSE() {
            const eventSource = new EventSource(config.sseUrl);

            eventSource.addEventListener('status', (e) => {
                const data = JSON.parse(e.data);
                console.log('Status:', data);
            });

            eventSource.addEventListener('arrival', (e) => {
                const data = JSON.parse(e.data);
                // server sends attendeeId not id
                const idx = appState.attendees.findIndex(a => a.id === (data.attendeeId || data.id));
                if (idx >= 0) {
                    appState.attendees[idx].arrived = true;
                    appState.attendees[idx].arrivedAt = data.arrivedAt || new Date().toISOString();
                }
                renderArrivals();
            });

            eventSource.addEventListener('tourUpdate', (e) => {
                const data = JSON.parse(e.data);
                appState.tourState[data.group] = data.state;
                renderArrivals();
            });

            eventSource.addEventListener('sessionUpdate', (e) => {
                const data = JSON.parse(e.data);
                appState.currentSession = data.session;
                document.getElementById('sessionDisplay').textContent = appState.currentSession;
            });

            eventSource.addEventListener('stateUpdate', (e) => {
                const data = JSON.parse(e.data);
                const state = data.systemState || data.state;
                appState.currentState = state;
                document.querySelectorAll('.state-btn').forEach(b => b.classList.remove('active'));
                const btn = document.querySelector(`[data-state="${state}"]`);
                if (btn) btn.classList.add('active');
            });

            eventSource.addEventListener('feedbackOpen', (e) => {
                const data = JSON.parse(e.data);
                if (data.submissions) {
                    appState.feedback.submissions.unshift(data);
                    renderFeedback();
                }
            });

            eventSource.addEventListener('sos', (e) => {
                const data = JSON.parse(e.data);
                const banner = document.getElementById('sosBanner');
                banner.classList.add('active');
                banner.textContent = `🚨 SOS: ${data.name} at ${data.time}`;
                setTimeout(() => banner.classList.remove('active'), 5000);
            });

            eventSource.addEventListener('ackUpdate', (e) => {
                const data = JSON.parse(e.data);
                // Find the announcement by alertId and update its acked array
                const entry = appState.announcements.find(a => a.id === data.alertId);
                if (entry) {
                    if (data.ackedIds) {
                        entry.acked = data.ackedIds;
                    } else if (data.attendeeId && !entry.acked?.includes(data.attendeeId)) {
                        entry.acked = [...(entry.acked || []), data.attendeeId];
                    }
                    updateDeliveryStatus();
                }
            });

            eventSource.onerror = () => {
                document.getElementById('connectionStatus').innerHTML = '<div class="live-dot" style="background: #E74C3C;"></div><span>Offline</span>';
            };
        }

        // ========== ANNOUNCEMENT POLLING ==========
        function pollAnnouncements() {
            setInterval(() => {
                if (!appState.authenticated) return;
                fetch(`${config.apiBase}/admin/announcements`, {
                    headers: { 'x-admin-pin': appState.adminPin }
                })
                    .then(r => r.json())
                    .then(data => {
                        if (data.length > 0 && (!appState.announcements[0] || data[0].id !== appState.announcements[0].id)) {
                            appState.announcements = data;
                            updateDeliveryStatus();
                        }
                    })
                    .catch(e => console.error('Poll failed:', e));
            }, config.pollInterval);
        }

        // ========== EMERGENCY BUTTON ==========
        function initEmergencyButton() {
            document.getElementById('emergencyBtn').addEventListener('click', () => {
                const msg = '🚨 EMERGENCY ALERT — All attendees stop what you are doing and await further instructions from the event team.';
                broadcastAnnouncement(msg);
                const banner = document.getElementById('sosBanner');
                banner.classList.add('active');
                banner.textContent = '🚨 EMERGENCY ACTIVATED';
                setTimeout(() => banner.classList.remove('active'), 5000);
            });
        }

        // ========== HELPER FUNCTIONS ==========
        function sendEvent(type, data) {
            fetch(`${config.apiBase}/admin/event`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-admin-pin': appState.adminPin
                },
                body: JSON.stringify({ type, ...data })
            }).catch(e => console.error('Event send failed:', e));
        }

        // ========== INIT ==========
        function initApp() {
            setInterval(updateClock, 1000);
            updateClock();
            initStateButtons();
            initActionButtons();
            initAICenter();
            initBroadcastSystem();
            initJourneyControl();
            initArrivalsPanel();
            initFeedbackPanel();
            initSSE();
            pollAnnouncements();
            initEmergencyButton();
        }

        // Start
        initLogin();
    </script>
</body>
</html>
