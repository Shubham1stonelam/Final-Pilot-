<!DOCTYPE html>

<html>
<head>
  <title>Event Control</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- TOP COMMAND BAR -->

  <div class="command-bar">
    <input id="aiInput" placeholder="Type command... (e.g. Call Group 1 to lobby)" />
    <button onclick="handleAICommand()">→</button>

```
<div class="quick-actions">
  <button onclick="sendPreset('Call all attendees to lobby')">Call All</button>
  <button onclick="sendPreset('Bus is arriving now')">Bus Alert</button>
  <button onclick="sendPreset('Please move to hall immediately')">Move</button>
  <button onclick="sendPreset('Lunch is served')">Lunch</button>
</div>
```

  </div>

  <!-- MAIN GRID -->

  <div class="grid">

```
<!-- ARRIVALS -->
<div class="card">
  <h2>Arrivals</h2>
  <div id="arrivals"></div>
</div>

<!-- JOURNEY -->
<div class="card">
  <h2>Session</h2>
  <div id="session">Waiting...</div>
</div>

<!-- BROADCAST -->
<div class="card large">
  <h2>Broadcast</h2>

  <textarea id="announcementInput" placeholder="Type announcement..."></textarea>

  <button onclick="preview()">Preview</button>
  <button onclick="send()">Send</button>

  <div id="previewBox"></div>
</div>
```

  </div>

  <script src="admin.js"></script>

</body>
</html>
