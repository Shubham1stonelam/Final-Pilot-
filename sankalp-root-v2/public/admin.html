<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SANKALP 2026 — Event Command Center</title>

  <style>
    :root {
      --bg: #0e0f09;
      --surface: #171910;
      --surface-2: #1f2218;
      --surface-3: #262a1d;
      --olive: #5f6838;
      --olive-bright: #8f993c;
      --gold: #d9ab28;
      --text: #f5f2e8;
      --text-dim: #a7a38f;
      --border: rgba(143, 153, 60, 0.18);
      --red: #c0392b;
      --green: #4caf50;
      --amber: #c97d2e;
      --blue: #6b9bd1;
      --g1: #6b9bd1;
      --g2: #d4a574;
      --radius: 14px;
      --shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    button, input, textarea { font: inherit; }

    body { display: flex; flex-direction: column; }

    .hidden { display: none !important; }

    /* Login */
    #loginScreen {
      position: fixed; inset: 0;
      background:
        radial-gradient(circle at top right, rgba(143,153,60,0.14), transparent 28%),
        linear-gradient(135deg, #0e0f09 0%, #171910 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; padding: 24px;
    }

    .login-card {
      width: 100%; max-width: 360px;
      background: rgba(23, 25, 16, 0.95);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      padding: 28px;
      display: flex; flex-direction: column; gap: 18px;
    }

    .login-brand { font-size: 30px; font-weight: 700; color: var(--gold); letter-spacing: 0.04em; }
    .login-sub { font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--text-dim); }

    .login-card input {
      width: 100%; background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      padding: 14px 16px; text-align: center;
      letter-spacing: 0.22em; font-size: 18px;
    }

    .login-card input:focus { outline: none; border-color: var(--olive-bright); }

    .login-card button {
      background: var(--olive-bright);
      color: var(--bg); border: none;
      border-radius: 10px; padding: 13px 16px;
      cursor: pointer; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
    }

    .login-error { min-height: 18px; font-size: 12px; color: #ff8479; }

    /* Main */
    #mainApp { display: flex; flex-direction: column; height: 100%; min-height: 0; }

    .topbar {
      height: 64px; flex-shrink: 0;
      border-bottom: 1px solid var(--border);
      background: rgba(23, 25, 16, 0.94);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px;
    }

    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .brand-mark {
      width: 32px; height: 32px; border-radius: 50%;
      display: grid; place-items: center;
      background: linear-gradient(135deg, var(--olive), var(--olive-bright));
      font-weight: 700;
    }

    .brand-title { font-size: 15px; font-weight: 700; letter-spacing: 0.08em; color: var(--gold); }
    .brand-sub { font-size: 11px; color: var(--text-dim); letter-spacing: 0.14em; text-transform: uppercase; }

    .topbar-right { display: flex; align-items: center; gap: 18px; font-size: 12px; color: var(--text-dim); }

    .live-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 8px 12px; border-radius: 999px;
    }

    .live-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      animation: blink 1.8s infinite;
    }

    @keyframes blink {
      0%,100%{opacity:1}
      50%{opacity:.4}
    }

    .clock { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--text); }

    /* ===== FIXED GRID (NO OVERLAP) ===== */
    .main-grid {
      flex: 1; min-height: 0;
      overflow: auto; padding: 16px;
      display: grid; gap: 16px;
      grid-template-columns: 1.2fr 1fr 1fr;
      align-items: start;
    }

    .card {
      background: linear-gradient(180deg, rgba(31,34,24,0.96), rgba(23,25,16,0.98));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .card-title {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 800;
    }

    /* FIXED POSITIONS */
    #statsCard { grid-column: 1 / -1; grid-row: 1; }
    #arrivalsCard { grid-column: 1 / 3; grid-row: 2; }
    #journeyCard { grid-column: 3; grid-row: 2; }
    #feedbackCard { grid-column: 1; grid-row: 3; }
    #broadcastCard { grid-column: 2; grid-row: 3; }
    #agentCard { grid-column: 3; grid-row: 3; }

    /* Responsive */
    @media (max-width: 1280px) {
      .main-grid { grid-template-columns: 1fr 1fr; }
      #statsCard { grid-column: 1 / -1; grid-row: 1; }
      #arrivalsCard { grid-column: 1 / -1; grid-row: 2; }
      #journeyCard { grid-column: 1; grid-row: 3; }
      #feedbackCard { grid-column: 2; grid-row: 3; }
      #broadcastCard { grid-column: 1; grid-row: 4; }
      #agentCard { grid-column: 2; grid-row: 4; }
    }

    @media (max-width: 900px) {
      .main-grid { grid-template-columns: 1fr; }
      #statsCard,#arrivalsCard,#journeyCard,#feedbackCard,#broadcastCard,#agentCard {
        grid-column: 1;
      }
    }
  </style>
</head>

<body>
  <div id="loginScreen">
    <div class="login-card">
      <div class="login-brand">SANKALP</div>
      <div class="login-sub">Event Command Center</div>
      <input id="pinInput" type="password" placeholder="ENTER PIN" />
      <button id="loginBtn">Enter</button>
      <div id="loginError" class="login-error"></div>
    </div>
  </div>

  <div id="mainApp" class="hidden">
    <div class="topbar">
      <div class="topbar-left">
        <div class="brand-mark">S</div>
        <div>
          <div class="brand-title">SANKALP 2026</div>
          <div class="brand-sub">Live Event Command</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="live-chip"><span class="live-dot"></span>Connected</div>
        <div class="clock" id="clockDisplay"></div>
      </div>
    </div>

    <div class="main-grid">
      <section class="card" id="statsCard"><div class="card-title">Live Status</div></section>
      <section class="card" id="arrivalsCard"><div class="card-title">Arrivals</div></section>
      <section class="card" id="journeyCard"><div class="card-title">Journey</div></section>
      <section class="card" id="feedbackCard"><div class="card-title">Feedback</div></section>
      <section class="card" id="broadcastCard"><div class="card-title">Broadcast</div></section>
      <section class="card" id="agentCard"><div class="card-title">AI Command</div></section>
    </div>
  </div>

  <script>
    document.getElementById('loginBtn').onclick = () => {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('mainApp').classList.remove('hidden');
    };

    setInterval(()=>{
      document.getElementById('clockDisplay').innerText =
        new Date().toLocaleTimeString();
    },1000);
  </script>
</body>
</html>
